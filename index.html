<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Music Collection</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0f13;
  --bg2:#17171d;
  --bg3:#1e1e27;
  --bg4:#26263300;
  --surface:#1e1e27;
  --surface2:#252530;
  --border:#ffffff14;
  --border2:#ffffff22;
  --text:#f0f0f5;
  --text2:#9090a8;
  --text3:#5a5a72;
  --accent:#8b7cf8;
  --accent2:#6c5ce7;
  --accent3:#a29bfe;
  --pink:#e84393;
  --teal:#00b894;
  --radius:10px;
  --radius2:14px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* Layout */
.app{display:grid;grid-template-columns:220px 1fr;grid-template-rows:1fr 90px;height:100vh;overflow:hidden;}
.sidebar{grid-row:1;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.main{grid-column:2;grid-row:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg);}
.player-bar{grid-column:1/3;background:var(--bg2);border-top:1px solid var(--border);display:grid;grid-template-columns:260px 1fr 220px;align-items:center;padding:0 20px;gap:12px;}

/* Sidebar */
.sidebar-logo{padding:18px 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--pink));border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-icon svg{width:18px;height:18px;fill:white;}
.logo-text{font-size:15px;font-weight:600;color:var(--text);}
.sidebar-section{padding:12px 12px 4px;font-size:10px;font-weight:600;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;margin:1px 8px;cursor:pointer;color:var(--text2);font-size:13px;transition:all 0.15s;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--accent2)22;color:var(--accent3);}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:0.8;}
.nav-count{margin-left:auto;font-size:11px;background:var(--surface2);padding:1px 6px;border-radius:10px;color:var(--text3);}
.pl-list{overflow-y:auto;flex:1;padding:4px 0;}
.sidebar-bottom{padding:10px;border-top:1px solid var(--border);}
.sidebar-btn{width:100%;padding:8px 12px;background:transparent;border:1px dashed var(--border2);border-radius:8px;color:var(--text3);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.15s;}
.sidebar-btn:hover{border-color:var(--accent);color:var(--accent);}

/* Main area */
.topbar{padding:16px 20px 0;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.topbar-title{font-size:20px;font-weight:700;flex:1;}
.search-box{position:relative;}
.search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:var(--text3);fill:none;stroke-width:2;stroke-linecap:round;}
.search-box input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 32px;color:var(--text);font-size:13px;width:200px;outline:none;transition:border 0.2s;}
.search-box input:focus{border-color:var(--accent);}
.search-box input::placeholder{color:var(--text3);}

/* Add-song toolbar */
.add-toolbar{padding:12px 20px 8px;display:flex;gap:8px;flex-shrink:0;}
.add-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;border:none;transition:all 0.15s;font-family:inherit;}
.add-btn.primary{background:var(--accent2);color:white;}
.add-btn.primary:hover{background:var(--accent);}
.add-btn.secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.add-btn.secondary:hover{color:var(--text);border-color:var(--border2);}
.add-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* Track table */
.track-header{display:grid;grid-template-columns:36px 48px 1fr 100px 70px 36px;gap:10px;padding:6px 20px;border-bottom:1px solid var(--border);color:var(--text3);font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;flex-shrink:0;}
.track-list{overflow-y:auto;flex:1;}
.track-row{display:grid;grid-template-columns:36px 48px 1fr 100px 70px 36px;gap:10px;padding:6px 20px;align-items:center;border-bottom:1px solid var(--border)08;cursor:pointer;transition:background 0.1s;}
.track-row:hover{background:var(--surface);}
.track-row.playing{background:var(--accent2)18;}
.t-num{font-size:12px;color:var(--text3);text-align:center;}
.t-art{width:40px;height:40px;border-radius:6px;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.t-art img{width:100%;height:100%;object-fit:cover;}
.t-art svg{width:18px;height:18px;stroke:var(--text3);fill:none;stroke-width:1.5;opacity:0.5;}
.t-info{min-width:0;}
.t-title{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-artist{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-album{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.t-dur{font-size:12px;color:var(--text3);text-align:right;}
.t-like{text-align:center;color:var(--text3);cursor:pointer;transition:color 0.15s;}
.t-like:hover,.t-like.liked{color:var(--pink);}
.t-like svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;}
.t-like.liked svg{fill:var(--pink);stroke:var(--pink);}
.playing-indicator{display:flex;align-items:flex-end;gap:2px;height:16px;justify-content:center;}
.playing-indicator span{display:block;width:3px;border-radius:2px;background:var(--accent3);}
.playing-indicator span:nth-child(1){animation:bar1 0.8s infinite;}
.playing-indicator span:nth-child(2){animation:bar2 0.6s infinite;}
.playing-indicator span:nth-child(3){animation:bar3 0.9s infinite;}
@keyframes bar1{0%,100%{height:4px}50%{height:14px}}
@keyframes bar2{0%,100%{height:14px}50%{height:6px}}
@keyframes bar3{0%,100%{height:8px}50%{height:14px}}

/* Player bar */
.now-playing{display:flex;align-items:center;gap:12px;min-width:0;}
.now-art{width:52px;height:52px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;}
.now-art img{width:100%;height:100%;object-fit:cover;}
.now-art svg{width:22px;height:22px;stroke:var(--text3);fill:none;opacity:0.5;}
.now-info{min-width:0;}
.now-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.now-artist{font-size:11px;color:var(--text2);}
.controls{display:flex;flex-direction:column;align-items:center;gap:8px;}
.ctrl-row{display:flex;align-items:center;gap:14px;}
.ctrl-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:4px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:color 0.15s;}
.ctrl-btn:hover{color:var(--text);}
.ctrl-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.play-main{width:36px;height:36px;background:var(--accent);border-radius:50%;color:white!important;}
.play-main:hover{background:var(--accent3)!important;color:var(--bg)!important;}
.play-main svg{width:16px;height:16px;}
.prog-row{display:flex;align-items:center;gap:8px;width:100%;}
.prog-row span{font-size:10px;color:var(--text3);min-width:30px;}
.prog-bar{flex:1;height:4px;background:var(--surface2);border-radius:2px;cursor:pointer;position:relative;}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent2),var(--accent3));transition:width 0.3s linear;}
.vol-row{display:flex;align-items:center;gap:8px;justify-content:flex-end;}
.vol-row svg{width:16px;height:16px;stroke:var(--text2);fill:none;stroke-width:2;stroke-linecap:round;}
input[type=range]{-webkit-appearance:none;height:4px;border-radius:2px;background:var(--surface2);outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent3);cursor:pointer;}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;height:100%;color:var(--text3);}
.empty-state svg{width:56px;height:56px;stroke:var(--text3);fill:none;stroke-width:1;opacity:0.4;}
.empty-state p{font-size:14px;}
.empty-state small{font-size:12px;opacity:0.6;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:#00000088;display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius2);padding:24px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal h2{font-size:16px;font-weight:600;margin-bottom:6px;}
.modal .sub{font-size:12px;color:var(--text2);margin-bottom:20px;line-height:1.6;}
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--surface);border-radius:8px;padding:3px;}
.tab{flex:1;padding:7px;text-align:center;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text2);transition:all 0.15s;}
.tab.active{background:var(--accent2);color:white;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;}
.form-group input,.form-group textarea{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;transition:border 0.2s;font-family:inherit;}
.form-group input:focus,.form-group textarea:focus{border-color:var(--accent);}
.form-group input::placeholder{color:var(--text3);}
.drop-zone{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:28px;text-align:center;cursor:pointer;color:var(--text2);font-size:13px;transition:all 0.2s;position:relative;}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--accent);background:var(--accent2)11;color:var(--accent3);}
.drop-zone svg{width:32px;height:32px;stroke:currentColor;fill:none;stroke-width:1.5;margin:0 auto 10px;display:block;opacity:0.6;}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.queue-list{max-height:180px;overflow-y:auto;margin-top:12px;border-radius:8px;border:1px solid var(--border);}
.queue-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);}
.queue-item:last-child{border-bottom:none;}
.queue-item .qi-art{width:32px;height:32px;border-radius:4px;background:var(--surface2);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.queue-item .qi-art img{width:100%;height:100%;object-fit:cover;}
.queue-item .qi-info{min-width:0;flex:1;}
.queue-item .qi-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.queue-item .qi-meta{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.queue-item .qi-status{font-size:10px;padding:2px 8px;border-radius:10px;}
.qi-status.ok{background:#00b89422;color:var(--teal);}
.qi-status.loading{background:var(--accent2)22;color:var(--accent3);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.modal-actions button{padding:8px 18px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;border:none;transition:all 0.15s;}
.btn-cancel{background:var(--surface2);color:var(--text2);}
.btn-cancel:hover{color:var(--text);}
.btn-ok{background:var(--accent2);color:white;}
.btn-ok:hover{background:var(--accent);}
.progress-bar-wrap{margin-top:8px;background:var(--surface);border-radius:4px;height:4px;}
.progress-bar-inner{height:100%;border-radius:4px;background:var(--accent3);transition:width 0.3s;}
/* ── Mobile responsive ──────────────────────────────── */
@media (max-width: 768px){
  .app{
    grid-template-columns:1fr;
    grid-template-rows:1fr 130px;
    height:100vh;
    height:100dvh;
  }
  .sidebar{
    position:fixed;
    left:0; top:0; bottom:0;
    width:240px;
    z-index:300;
    transform:translateX(-100%);
    transition:transform 0.25s ease;
    box-shadow:2px 0 20px #00000066;
  }
  .sidebar.open{transform:translateX(0);}
  .sidebar-overlay{
    position:fixed; inset:0; background:#00000088;
    z-index:299; display:none;
  }
  .sidebar-overlay.show{display:block;}
  .main{grid-column:1;}
  .mobile-menu-btn{
    display:flex!important;
    align-items:center;
    justify-content:center;
    width:34px;height:34px;
    border-radius:8px;
    background:var(--surface);
    border:1px solid var(--border2);
    color:var(--text2);
    cursor:pointer;
    flex-shrink:0;
  }
  .mobile-menu-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
  .topbar{flex-wrap:wrap;}
  .topbar-title{font-size:17px;}
  .search-box{flex:1 1 100%;order:3;margin-top:8px;}
  .search-box input{width:100%;}
  .add-toolbar{flex-wrap:wrap;}
  .add-btn{flex:1;justify-content:center;padding:9px 10px;font-size:12px;}
  .track-header{display:none;}
  .track-row{
    grid-template-columns:44px 1fr 32px;
    grid-template-areas:"art info like";
    padding:8px 14px;
    gap:10px;
  }
  .track-row .t-num{display:none;}
  .track-row .t-art{grid-area:art;width:44px;height:44px;}
  .track-row .t-info{grid-area:info;}
  .track-row .t-album{display:none;}
  .track-row .t-dur{display:none;}
  .track-row .t-like{grid-area:like;}
  .player-bar{
    grid-template-columns:1fr;
    grid-template-rows:auto auto;
    padding:10px 14px;
    gap:8px;
    row-gap:6px;
  }
  .now-playing{order:1;}
  .controls{order:2;}
  .vol-row{display:none;}
  .ctrl-row{gap:24px;}
  .ctrl-btn svg{width:20px;height:20px;}
  .play-main{width:42px;height:42px;}
  .play-main svg{width:18px;height:18px;}
  .modal{width:92vw;padding:18px;}
  .tabs{font-size:11px;}
}
@media (max-width: 420px){
  .now-title{font-size:12px;}
  .topbar-title{font-size:16px;}
}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0zM21 16a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg>
      </div>
      <span class="logo-text">My Music</span>
    </div>
    <div style="padding:4px 16px 10px;font-size:11px;color:var(--text3);border-bottom:1px solid var(--border);">Made with ❤️ by BKV</div>
    <div class="sidebar-section">Library</div>
    <div class="nav-item active" onclick="selectView('all',this)">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      All songs <span class="nav-count" id="count-all">0</span>
    </div>
    <div class="nav-item" onclick="selectView('liked',this)">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Liked songs <span class="nav-count" id="count-liked">0</span>
    </div>
    <div class="sidebar-section">Playlists</div>
    <div class="pl-list" id="pl-list"></div>
    <div class="sidebar-bottom">
      <button class="sidebar-btn" onclick="showNewPlaylist()">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New playlist
      </button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <button class="mobile-menu-btn" onclick="toggleSidebar()">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="topbar-title" id="view-title">All songs</span>
      <div class="search-box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search songs, artists…" id="search-input" oninput="renderTracks()"/>
      </div>
    </div>
    <div class="add-toolbar">
      <button class="add-btn primary" onclick="showAddModal('local')">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Import files / folder
      </button>
      <button class="add-btn secondary" onclick="showAddModal('url')">
        <svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Add via URL
      </button>
    </div>
    <div class="track-header">
      <div>#</div><div></div>
      <div>Title</div><div>Album</div><div style="text-align:right">Duration</div><div></div>
    </div>
    <div class="track-list" id="track-list"></div>
  </div>

  <!-- Player bar -->
  <div class="player-bar">
    <div class="now-playing">
      <div class="now-art" id="now-art">
        <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg>
      </div>
      <div class="now-info">
        <div class="now-title" id="now-title">Nothing playing</div>
        <div class="now-artist" id="now-artist">—</div>
      </div>
    </div>
    <div class="controls">
      <div class="ctrl-row">
        <button class="ctrl-btn" onclick="prevTrack()" title="Previous">
          <svg viewBox="0 0 24 24"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
        </button>
        <button class="ctrl-btn play-main" id="play-btn" onclick="togglePlay()">
          <svg viewBox="0 0 24 24" id="play-icon"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <button class="ctrl-btn" onclick="nextTrack()" title="Next">
          <svg viewBox="0 0 24 24"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
        </button>
      </div>
      <div class="prog-row">
        <span id="cur-time">0:00</span>
        <div class="prog-bar" id="prog-bar" onclick="seekTo(event)">
          <div class="prog-fill" id="prog-fill" style="width:0%"></div>
        </div>
        <span id="dur-time">0:00</span>
      </div>
    </div>
    <div class="vol-row">
      <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      <input type="range" min="0" max="100" value="80" id="vol-slider" oninput="audio.volume=this.value/100" style="width:80px"/>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" style="display:none"></div>

<script>
// ── R2 bucket config ────────────────────────────────────
// Point this at your Cloudflare Worker that lists your R2 bucket's contents.
const R2_LISTING_URL = "https://purple-meadow-bc66.mentorexamm.workers.dev";

// ── State ──────────────────────────────────────────────
let songs = [];
let playlists = [];
let currentId = null;
let currentView = 'all';
let isPlaying = false;
let simInterval = null;
let simPos = 0;

const audio = new Audio();
audio.volume = 0.8;
audio.addEventListener('ended', nextTrack);
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const p = audio.currentTime / audio.duration * 100;
  document.getElementById('prog-fill').style.width = p + '%';
  document.getElementById('cur-time').textContent = fmt(audio.currentTime);
});
audio.addEventListener('loadedmetadata', () => {
  document.getElementById('dur-time').textContent = fmt(audio.duration);
});

function fmt(s){
  if(!s||isNaN(s))return'0:00';
  const m=Math.floor(s/60),sec=Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}

// ── Metadata extraction ────────────────────────────────
function readMetaFromFile(file){
  return new Promise(resolve => {
    if(typeof jsmediatags === 'undefined'){ resolve({}); return; }
    try{
      jsmediatags.read(file, {
        onSuccess(tag){
          const t = tag.tags;
          let artDataUrl = null;
          if(t.picture){
            const {data, format} = t.picture;
            const bytes = new Uint8Array(data);
            const blob = new Blob([bytes], {type: format});
            artDataUrl = URL.createObjectURL(blob);
          }
          resolve({
            title: t.title || '',
            artist: t.artist || '',
            album: t.album || '',
            art: artDataUrl || ''
          });
        },
        onError(){ resolve({}); }
      });
    }catch(e){ resolve({}); }
  });
}

function nameFromFile(file){
  return file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g,' ');
}

// Strip leading numeric/code prefixes some collections use, e.g. "0000A001Badal Jaye Agar Mali"
function cleanTitleFromKey(key){
  let name = key.replace(/\.[^.]+$/, ''); // drop extension
  name = name.replace(/^[0-9A-Za-z]{4,12}(?=[A-Z])/, ''); // strip leading code if followed by a capital letter
  name = name.replace(/[-_]/g, ' ').trim();
  return name || key;
}

function readMetaFromUrl(url){
  return new Promise(resolve => {
    if(typeof jsmediatags === 'undefined'){ resolve({}); return; }
    try{
      jsmediatags.read(url, {
        onSuccess(tag){
          const t = tag.tags;
          let artDataUrl = null;
          if(t.picture){
            const {data, format} = t.picture;
            const bytes = new Uint8Array(data);
            const blob = new Blob([bytes], {type: format});
            artDataUrl = URL.createObjectURL(blob);
          }
          resolve({
            title: t.title || '',
            artist: t.artist || '',
            album: t.album || '',
            art: artDataUrl || ''
          });
        },
        onError(){ resolve({}); }
      });
    }catch(e){ resolve({}); }
  });
}

// ── Load songs from R2 bucket via Worker listing endpoint ──
async function loadFromR2(){
  if(!R2_LISTING_URL || R2_LISTING_URL.includes('YOUR-SUBDOMAIN')){
    console.warn('R2_LISTING_URL not configured — skipping bucket auto-load.');
    return;
  }
  showLoadingBanner(true, 'Loading your collection…');
  try{
    const res = await fetch(R2_LISTING_URL, { cache: 'no-store' });
    if(!res.ok) throw new Error('Worker responded with status ' + res.status);
    const files = await res.json();
    let loaded = 0;
    for(const f of files){
      // Encode each path segment so spaces/special chars in filenames work on all browsers
      const safeUrl = f.url.replace(f.key, encodeURIComponent(f.key).replace(/%2F/g, '/'));
      const song = {
        id: 'r2_' + f.key,
        title: cleanTitleFromKey(f.key),
        artist: '',
        album: '',
        art: '',
        url: safeUrl,
        local: false,
        liked: false,
        playlist: 'all',
        duration: 0
      };
      songs.push(song);
      loaded++;
      showLoadingBanner(true, `Loading your collection… (${loaded}/${files.length})`);
      renderTracks();
      // Fetch ID3 tags + duration in background, don't block the list from showing
      enrichSong(song);
    }
  }catch(e){
    console.error('Failed to load R2 bucket listing:', e);
    showLoadingBanner(true, '⚠ Could not load bucket: ' + e.message);
    setTimeout(() => showLoadingBanner(false), 6000);
    return;
  }
  showLoadingBanner(false);
}

async function enrichSong(song){
  try{
    const meta = await readMetaFromUrl(song.url);
    if(meta.title) song.title = meta.title;
    if(meta.artist) song.artist = meta.artist;
    if(meta.album) song.album = meta.album;
    if(meta.art) song.art = meta.art;
  }catch(e){}
  try{
    const dur = await getAudioDuration(song.url);
    song.duration = dur;
  }catch(e){}
  renderTracks();
}

function showLoadingBanner(show, text){
  let el = document.getElementById('loading-banner');
  if(!el){
    el = document.createElement('div');
    el.id = 'loading-banner';
    el.style.cssText = 'position:fixed;bottom:100px;right:20px;background:var(--surface2);color:var(--text2);padding:8px 14px;border-radius:8px;font-size:12px;border:1px solid var(--border2);z-index:50;';
    document.body.appendChild(el);
  }
  el.style.display = show ? 'block' : 'none';
  if(text) el.textContent = text;
}

async function processFiles(files){
  const list = Array.from(files).filter(f => /\.(mp3|ogg|wav|flac|aac|m4a|opus|weba)$/i.test(f.name));
  const results = [];
  for(const f of list){
    const meta = await readMetaFromFile(f);
    const url = URL.createObjectURL(f);
    results.push({
      id: Date.now() + Math.random(),
      title: meta.title || nameFromFile(f),
      artist: meta.artist || '',
      album: meta.album || '',
      art: meta.art || '',
      url,
      local: true,
      liked: false,
      playlist: 'all',
      duration: 0
    });
  }
  return results;
}

// ── Render ─────────────────────────────────────────────
function getVisible(){
  const q = document.getElementById('search-input').value.toLowerCase();
  let list = songs;
  if(currentView === 'liked') list = songs.filter(s => s.liked);
  else if(currentView !== 'all') list = songs.filter(s => s.playlist === currentView || (s.extraPl || []).includes(currentView));
  if(q) list = list.filter(s =>
    s.title.toLowerCase().includes(q) ||
    s.artist.toLowerCase().includes(q) ||
    s.album.toLowerCase().includes(q)
  );
  return list;
}

function renderTracks(){
  const list = getVisible();
  const el = document.getElementById('track-list');
  if(!list.length){
    el.innerHTML = `<div class="empty-state">
      <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg>
      <p>No songs here yet</p>
      <small>Import files or add a URL to get started</small>
    </div>`;
    return;
  }
  el.innerHTML = list.map((s,i) => `
    <div class="track-row ${currentId===s.id?'playing':''}" onclick="playSong('${s.id}')">
      <div class="t-num">
        ${currentId===s.id && isPlaying
          ? `<div class="playing-indicator"><span></span><span></span><span></span></div>`
          : (i+1)}
      </div>
      <div class="t-art">
        ${s.art
          ? `<img src="${s.art}" alt="" onerror="this.style.display='none'"/>`
          : `<svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg>`}
      </div>
      <div class="t-info">
        <div class="t-title">${esc(s.title)}</div>
        <div class="t-artist">${esc(s.artist || '—')}</div>
      </div>
      <div class="t-album">${esc(s.album || '')}</div>
      <div class="t-dur">${fmt(s.duration)}</div>
      <div class="t-like ${s.liked?'liked':''}" onclick="toggleLike(event,'${s.id}')">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </div>
    </div>`).join('');
  updateCounts();
}

function renderPlaylists(){
  document.getElementById('pl-list').innerHTML = playlists.map(p => `
    <div class="nav-item ${currentView===p.id?'active':''}" onclick="selectView('${p.id}',this,'${esc(p.name)}')">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      ${esc(p.name)}
    </div>`).join('');
}

function updateCounts(){
  document.getElementById('count-all').textContent = songs.length;
  document.getElementById('count-liked').textContent = songs.filter(s=>s.liked).length;
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Playback ───────────────────────────────────────────
function playSong(id){
  const song = songs.find(s => String(s.id) === String(id));
  if(!song) return;
  currentId = song.id;
  clearInterval(simInterval);
  document.getElementById('now-title').textContent = song.title;
  document.getElementById('now-artist').textContent = song.artist || '—';
  const na = document.getElementById('now-art');
  na.innerHTML = song.art
    ? `<img src="${song.art}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:8px" onerror="this.style.display='none'"/>`
    : `<svg viewBox="0 0 24 24" stroke="var(--text3)" fill="none" stroke-width="1.5" style="width:22px;height:22px;opacity:0.5"><path d="M9 18V5l12-2v13M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg>`;
  if(song.url){
    audio.src = song.url;
    audio.play().then(() => { isPlaying = true; updatePlayBtn(); }).catch(() => {
      isPlaying = true; updatePlayBtn(); startSim(song.duration || 200);
    });
  } else {
    audio.src = '';
    isPlaying = true;
    updatePlayBtn();
    startSim(song.duration || 200);
  }
  renderTracks();
}

function startSim(dur){
  clearInterval(simInterval); simPos = 0;
  document.getElementById('dur-time').textContent = fmt(dur);
  document.getElementById('prog-fill').style.width = '0%';
  simInterval = setInterval(() => {
    simPos++;
    document.getElementById('prog-fill').style.width = (simPos/dur*100)+'%';
    document.getElementById('cur-time').textContent = fmt(simPos);
    if(simPos >= dur){ clearInterval(simInterval); nextTrack(); }
  }, 1000);
}

function togglePlay(){
  if(!currentId){ const l = getVisible(); if(l.length) playSong(l[0].id); return; }
  if(isPlaying){
    audio.src ? audio.pause() : clearInterval(simInterval);
    isPlaying = false;
  } else {
    if(audio.src) audio.play();
    else {
      const s = songs.find(x=>String(x.id)===String(currentId));
      startSim(s ? s.duration || 200 : 200);
    }
    isPlaying = true;
  }
  updatePlayBtn(); renderTracks();
}

function updatePlayBtn(){
  const icon = document.getElementById('play-icon');
  icon.innerHTML = isPlaying
    ? '<line x1="6" y1="4" x2="6" y2="20"/><line x1="18" y1="4" x2="18" y2="20"/>'
    : '<polygon points="5 3 19 12 5 21 5 3"/>';
}

function nextTrack(){
  const l = getVisible(); if(!l.length) return;
  const i = l.findIndex(s=>String(s.id)===String(currentId));
  playSong(l[(i+1)%l.length].id);
}
function prevTrack(){
  const l = getVisible(); if(!l.length) return;
  const i = l.findIndex(s=>String(s.id)===String(currentId));
  playSong(l[(i-1+l.length)%l.length].id);
}
function seekTo(e){
  const bar = document.getElementById('prog-bar');
  const pct = e.offsetX / bar.offsetWidth;
  if(audio.src && audio.duration){ audio.currentTime = pct * audio.duration; }
}
function toggleLike(e, id){
  e.stopPropagation();
  const s = songs.find(x=>String(x.id)===String(id));
  if(s){ s.liked = !s.liked; renderTracks(); }
}

// ── View/Playlist ─────────────────────────────────────
function selectView(id, el, name){
  currentView = id;
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-title').textContent = name || el.textContent.trim().replace(/\d+$/,'').trim();
  renderTracks();
  closeSidebar();
}

// ── Modals ─────────────────────────────────────────────
function closeModal(){ document.getElementById('modal').style.display='none'; document.getElementById('modal').innerHTML=''; }

function showNewPlaylist(){
  const m = document.getElementById('modal');
  m.style.display = 'flex';
  m.innerHTML = `<div class="modal">
    <h2>New playlist</h2>
    <div class="form-group"><label>Name</label><input type="text" id="m-pname" placeholder="e.g. Chill vibes"/></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-ok" onclick="addPlaylist()">Create</button>
    </div>
  </div>`;
}

function addPlaylist(){
  const name = document.getElementById('m-pname').value.trim();
  if(!name) return;
  const id = 'pl_'+Date.now();
  playlists.push({id, name});
  closeModal(); renderPlaylists();
}

// ── Add songs modal ────────────────────────────────────
let pendingSongs = [];

function showAddModal(tab){
  pendingSongs = [];
  const m = document.getElementById('modal');
  m.style.display = 'flex';
  m.innerHTML = `<div class="modal">
    <h2>Add music</h2>
    <div class="tabs">
      <div class="tab ${tab==='local'?'active':''}" id="tab-local" onclick="switchTab('local')">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" style="width:14px;height:14px;display:inline;margin-right:4px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Local files
      </div>
      <div class="tab ${tab==='url'?'active':''}" id="tab-url" onclick="switchTab('url')">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" style="width:14px;height:14px;display:inline;margin-right:4px"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Online URL
      </div>
    </div>
    <div id="tab-content"></div>
    <div id="queue-wrap" style="display:none">
      <div style="font-size:11px;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;">Ready to import <span id="queue-count">0</span> songs</div>
      <div class="queue-list" id="queue-list"></div>
      <div class="progress-bar-wrap" id="meta-progress" style="display:none"><div class="progress-bar-inner" id="meta-bar" style="width:0%"></div></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-ok" onclick="commitSongs()">Add to library</button>
    </div>
  </div>`;
  switchTab(tab);
}

function switchTab(tab){
  document.getElementById('tab-local').classList.toggle('active', tab==='local');
  document.getElementById('tab-url').classList.toggle('active', tab==='url');
  const tc = document.getElementById('tab-content');
  if(tab === 'local'){
    tc.innerHTML = `
      <p class="sub">Select individual files or an entire folder. Metadata (title, artist, album, cover art) will be read automatically from each file.</p>
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept=".mp3,.ogg,.wav,.flac,.aac,.m4a,.opus,.weba" multiple onchange="handleFiles(this.files)"/>
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <div>Drop audio files here, or <strong>click to browse</strong></div>
        <small style="color:var(--text3);margin-top:4px;display:block">MP3, FLAC, OGG, WAV, M4A and more</small>
      </div>
      <div style="margin-top:8px;text-align:center">
        <button class="add-btn secondary" onclick="document.getElementById('folder-input').click()" style="margin:auto">
          <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          Import entire folder
        </button>
        <input type="file" id="folder-input" webkitdirectory mozdirectory style="display:none" onchange="handleFiles(this.files)"/>
      </div>`;
    setupDrop();
  } else {
    tc.innerHTML = `
      <p class="sub">Paste a direct audio URL (Dropbox: change <code>?dl=0</code> → <code>?dl=1</code>; Google Drive: use <code>/uc?export=download&id=FILE_ID</code>).</p>
      <div class="form-group"><label>Title (optional — leave blank to auto-fill)</label><input type="text" id="u-title" placeholder="Song title"/></div>
      <div class="form-group"><label>Artist (optional)</label><input type="text" id="u-artist" placeholder="Artist name"/></div>
      <div class="form-group"><label>Album (optional)</label><input type="text" id="u-album" placeholder="Album name"/></div>
      <div class="form-group"><label>Audio URL *</label><input type="text" id="u-url" placeholder="https://…" oninput="previewUrl()"/></div>
      <div class="form-group"><label>Album art URL (optional)</label><input type="text" id="u-art" placeholder="https://…"/></div>`;
  }
}

function setupDrop(){
  const dz = document.getElementById('drop-zone');
  if(!dz) return;
  dz.addEventListener('dragover', e=>{ e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', ()=>dz.classList.remove('dragover'));
  dz.addEventListener('drop', e=>{ e.preventDefault(); dz.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
}

async function handleFiles(files){
  const mp = document.getElementById('meta-progress');
  const mb = document.getElementById('meta-bar');
  const qw = document.getElementById('queue-wrap');
  qw.style.display = 'block'; mp.style.display = 'block';
  const list = Array.from(files).filter(f => /\.(mp3|ogg|wav|flac|aac|m4a|opus|weba)$/i.test(f.name));
  pendingSongs = [];
  for(let i=0; i<list.length; i++){
    const f = list[i];
    mb.style.width = ((i+1)/list.length*100)+'%';
    const meta = await readMetaFromFile(f);
    const url = URL.createObjectURL(f);
    const dur = await getAudioDuration(url);
    const song = {
      id: Date.now()+Math.random(),
      title: meta.title || nameFromFile(f),
      artist: meta.artist || '',
      album: meta.album || '',
      art: meta.art || '',
      url, local: true, liked: false, playlist: 'all',
      duration: dur
    };
    pendingSongs.push(song);
    renderQueue();
  }
  mp.style.display = 'none';
}

function getAudioDuration(url){
  return new Promise(res => {
    const a = new Audio(url);
    a.addEventListener('loadedmetadata', () => res(Math.round(a.duration)));
    a.addEventListener('error', () => res(0));
    setTimeout(() => res(0), 4000);
  });
}

function previewUrl(){
  const url = document.getElementById('u-url').value.trim();
  if(!url) return;
  pendingSongs = [{
    id: Date.now()+Math.random(),
    title: document.getElementById('u-title').value.trim() || url.split('/').pop().replace(/\?.*$/,'').replace(/\.[^.]+$/,'') || 'Track',
    artist: document.getElementById('u-artist').value.trim(),
    album: document.getElementById('u-album').value.trim(),
    art: document.getElementById('u-art').value.trim(),
    url, local: false, liked: false, playlist: 'all', duration: 0
  }];
  const qw = document.getElementById('queue-wrap');
  qw.style.display = 'block';
  renderQueue();
  const a = new Audio(url);
  a.addEventListener('loadedmetadata', () => {
    pendingSongs[0].duration = Math.round(a.duration);
    renderQueue();
  });
}

function renderQueue(){
  document.getElementById('queue-count').textContent = pendingSongs.length;
  document.getElementById('queue-list').innerHTML = pendingSongs.map(s => `
    <div class="queue-item">
      <div class="qi-art">${s.art ? `<img src="${s.art}" alt=""/>` : ''}</div>
      <div class="qi-info">
        <div class="qi-name">${esc(s.title)}</div>
        <div class="qi-meta">${esc(s.artist||'Unknown artist')}${s.album?' · '+esc(s.album):''}</div>
      </div>
      <span class="qi-status ok">${fmt(s.duration)}</span>
    </div>`).join('');
}

function commitSongs(){
  if(!pendingSongs.length){
    // URL tab with no preview triggered — just try to read fields
    const urlEl = document.getElementById('u-url');
    if(urlEl && urlEl.value.trim()){
      pendingSongs = [{
        id: Date.now()+Math.random(),
        title: document.getElementById('u-title').value.trim() || 'Track',
        artist: document.getElementById('u-artist').value.trim(),
        album: document.getElementById('u-album').value.trim(),
        art: document.getElementById('u-art').value.trim(),
        url: urlEl.value.trim(), local: false, liked: false, playlist: 'all', duration: 0
      }];
    }
  }
  songs.push(...pendingSongs);
  pendingSongs = [];
  closeModal(); renderTracks(); updateCounts();
}

// ── Mobile sidebar toggle ───────────────────────────────
function toggleSidebar(){
  document.querySelector('.sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar(){
  document.querySelector('.sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

// ── Init ──────────────────────────────────────────────
renderTracks(); renderPlaylists(); updateCounts();
loadFromR2();
</script>
